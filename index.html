<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fullscreen Blue Page</title>

<style>
    body {
        margin: 0;
        background-color: #0076D6;
        color: white;
        font-family: Arial, sans-serif;
    }

    .content {
        position: absolute;
        top: 10px;
        left: 10px;
    }

    .right-image {
        position: fixed;
        top: 50%;
        right: 20px;
        transform: translateY(-50%);
        max-width: 220px;
        height: auto;
        background: transparent;
        display: block;
        user-select: none;
        pointer-events: none;
    }
</style>
</head>

<body onclick="goFullscreen()">

<div class="content">
    <h1>Hello</h1>
    <p>Top-left white text on your custom blue.</p>
</div>

<img class="right-image" src="https://www.image2url.com/r2/default/images/1776872912794-bd93d864-f41d-4322-a7c7-e04a7a3e4daa.png" alt="image">

<script>
function goFullscreen() {
    const elem = document.documentElement;

    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
    }
}

window.onload = () => {
    goFullscreen();
};
</script>

</body>
</html>
