<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fullscreen + Frame</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      cursor: pointer;
    }

    #frame {
      display: none;
      border: 10px solid red;
      padding: 50px 100px;
      color: white;
      font-size: 40px;
      text-align: center;
    }
  </style>
</head>
<body>

<div id="frame">Hi</div>

<script>
  function goFullscreenAndShow() {
    const elem = document.documentElement;

    if (elem.requestFullscreen) {
      elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
      elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) {
      elem.msRequestFullscreen();
    }

    // Show the red frame
    document.getElementById("frame").style.display = "block";

    // Remove click event so it only happens once
    document.removeEventListener("click", goFullscreenAndShow);
  }

  document.addEventListener("click", goFullscreenAndShow);
</script>

</body>
</html>
