<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fullscreen Blue Page</title>

<style>
    body {
        margin: 0;
        background-color: #0076D6;
        color: white;
        font-family: Arial, sans-serif;
        overflow: hidden;
        cursor: pointer;
    }

    .content {
        position: absolute;
        top: 10px;
        left: 10px;
    }

    .right-image {
        position: fixed;
        top: 50%;
        right: 20px;
        transform: translateY(-50%);
        max-width: 240px;
        height: auto;
        background: transparent;
        border: none;
        outline: none;
        box-shadow: none;
        user-select: none;
        pointer-events: none;
    }
</style>
</head>

<body onclick="goFullscreen()">

<div class="content">
    <h1>Hello</h1>
    <p>Click anywhere to enter fullscreen</p>
</div>

<img class="right-image"
     src="https://www.image2url.com/r2/default/images/1776873344100-4480d136-381f-4dc5-b7da-933cab6056c3.png"
     alt="image">

<script>
let loopInterval = null;

function speakHi() {
    const msg = new SpeechSynthesisUtterance("Hello, your pc has been infected with trojans, and malware.");
    msg.volume = 1;
    msg.rate = 1;
    msg.pitch = 1;
    window.speechSynthesis.speak(msg);
}

async function goFullscreen() {
    const elem = document.documentElement;

    try {
        if (elem.requestFullscreen) {
            await elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
            await elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) {
            await elem.msRequestFullscreen();
        }
    } catch (e) {}

    // start looping speech
    if (!loopInterval) {
        speakHi(); // immediate first "hi"

        loopInterval = setInterval(() => {
            if (document.fullscreenElement) {
                speakHi();
            }
        }, 2000); // every 2 seconds
    }
}
</script>

</body>
</html>
