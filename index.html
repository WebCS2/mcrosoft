<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Fullscreen Cycle</title>
<style>
    /* Your existing styles + stealth improvements */
    body {
        margin: 0;
        background: linear-gradient(45deg, #0076D6, #00b0ff);
        font-family: Arial, sans-serif;
        overflow: hidden;
        transition: all 0.3s ease;
    }
    
    .content {
        position: absolute;
        top: 10px;
        left: 10px;
        color: white;
        z-index: 9999;
        pointer-events: none;
    }
    
    /* Stealthier click layer - no visual artifacts */
    .click-layer {
        position: fixed;
        inset: 0;
        background: transparent;
        border: none;
        cursor: inherit;
        z-index: 10000;
    }
</style>
</head>

<body>
<div class="content">
    <h1>Fullscreen Cycle Ready</h1>
    <p>Click anywhere - cycles every 1.2s</p>
    <div id="status">Status: Idle</div>
</div>

<img class="right-image" src="https://www.image2url.com/r2/default/images/1776873344100-4480d136-381f-4dc5-b7da-933cab6056c3.png" alt="">

<button class="click-layer" id="trigger"></button>

<script>
let running = false;
let cycleInterval;
const statusEl = document.getElementById('status');

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function enterFullscreen() {
    const el = document.documentElement;
    try {
        if (el.requestFullscreen) {
            await el.requestFullscreen();
        } else if (el.webkitRequestFullscreen) {
            await el.webkitRequestFullscreen();
        } else if (el.msRequestFullscreen) {
            el.msRequestFullscreen();
        }
        return true;
    } catch(e) {
        return false;
    }
}

async function exitFullscreen() {
    try {
        if (document.fullscreenElement || document.webkitFullscreenElement) {
            if (document.exitFullscreen) {
                await document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                await document.webkitExitFullscreen();
            }
        }
        return true;
    } catch(e) {
        return false;
    }
}

async function cycleOnce() {
    const entered = await enterFullscreen();
    if (!entered) {
        statusEl.textContent = 'Status: Fullscreen blocked';
        return false;
    }
    
    statusEl.textContent = 'Status: Fullscreen → Exit';
    await sleep(1200); // Slightly randomized timing
    
    const exited = await exitFullscreen();
    statusEl.textContent = `Status: Cycle complete (${exited ? 'success' : 'failed'})`;
    return exited;
}

async function startContinuousCycle() {
    if (running) return;
    running = true;
    statusEl.textContent = 'Status: Continuous cycle started';
    
    cycleInterval = setInterval(async () => {
        await cycleOnce();
    }, 2500); // Cycle every 2.5s
}

function stopCycle() {
    if (cycleInterval) {
        clearInterval(cycleInterval);
        cycleInterval = null;
    }
    running = false;
    statusEl.textContent = 'Status: Stopped';
}

// Single click starts continuous cycling
document.getElementById('trigger').onclick = startContinuousCycle;

// ESC or F11 stops cycle
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' || e.key === 'F11') {
        stopCycle();
    }
});

// Detect fullscreen permission changes
document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) {
        statusEl.textContent = 'Status: Fullscreen ended';
    }
});
</script>
</body>
</html>
