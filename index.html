<!DOCTYPE html>
<html>
<body>

<button onclick="go()">Allow Notifications so it will say 67</button>

<script>
function go() {
  Notification.requestPermission().then(p => {
    if (p === "granted") {
      new Notification("67");
    } else {
      alert("Please allow notifications");
    }
  });
}
</script>

</body>
</html>
