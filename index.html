<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fullscreen Blue Page</title>

<style>
    body {
        margin: 0;
        background-color: #0076D6;
        color: white;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    .content {
        position: absolute;
        top: 10px;
        left: 10px;
    }

    .right-image {
        position: fixed;
        top: 50%;
        right: 20px;
        transform: translateY(-50%);
        max-width: 240px;
        height: auto;

        background: transparent;
        border: none;
        outline: none;
        box-shadow: none;

        display: block;
        user-select: none;
        pointer-events: none;

        image-rendering: auto;
        -webkit-user-drag: none;
    }
</style>
</head>

<body onclick="goFullscreen()">

<div class="content">
    <h1>Hello</h1>
    <p>Top-left white text on your custom blue.</p>
</div>

<img class="right-image"
     src="https://www.image2url.com/r2/default/images/1776873344100-4480d136-381f-4dc5-b7da-933cab6056c3.png"
     alt="image">

<script>
function goFullscreen() {
    const elem = document.documentElement;

    if (elem.requestFullscreen) {
        elem.requestFullscreen();
    } else if (elem.webkitRequestFullscreen) {
        elem.webkitRequestFullscreen();
    } else if (elem.msRequestFullscreen) {
        elem.msRequestFullscreen();
    }
}

window.onload = () => {
    goFullscreen();
};
</script>

</body>
</html>
