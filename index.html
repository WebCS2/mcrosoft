<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pixel Worlds Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <style>
    body {
      margin: 0;
      background: #050816;
      color: #eee;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }
    canvas {
      display: block;
      touch-action: none;
    }
    #name-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    #name-box {
      background: #111827;
      padding: 16px 20px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.6);
      max-width: 280px;
      width: 90%;
      text-align: center;
    }
    #name-box h2 {
      margin: 0 0 8px;
      font-size: 18px;
    }
    #name-input {
      width: 100%;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      font-size: 14px;
      margin-top: 6px;
    }
    #name-confirm {
      margin-top: 10px;
      width: 100%;
      padding: 6px 0;
      border-radius: 6px;
      border: none;
      background: #22c55e;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    #status {
      position: fixed;
      top: 8px;
      left: 8px;
      padding: 4px 8px;
      background: rgba(0,0,0,0.6);
      border-radius: 6px;
      font-size: 11px;
      z-index: 5;
    }
    #chat {
      position: fixed;
      right: 8px;
      top: 8px;
      width: 220px;
      max-height: 45vh;
      background: rgba(0,0,0,0.7);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      font-size: 11px;
      z-index: 5;
    }
    #chat-log {
      flex: 1;
      padding: 6px;
      overflow-y: auto;
    }
    #chat-input-row {
      display: flex;
      border-top: 1px solid #333;
    }
    #chat-input {
      flex: 1;
      border: none;
      padding: 4px;
      font-size: 11px;
      background: #020617;
      color: #e5e7eb;
      border-radius: 0 0 0 6px;
    }
    #chat-send {
      border: none;
      padding: 4px 8px;
      font-size: 11px;
      background: #3b82f6;
      color: #fff;
      border-radius: 0 0 6px 0;
      cursor: pointer;
    }

    /* Mobile controls */
    #controls {
      position: fixed;
      inset: auto 0 0 0;
      padding: 8px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      pointer-events: none;
      z-index: 4;
    }
    .ctrl-group {
      pointer-events: auto;
      display: flex;
      gap: 6px;
    }
    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 40px);
      grid-template-rows: repeat(3, 40px);
      gap: 4px;
    }
    .dpad button,
    .action-btn {
      background: rgba(15,23,42,0.8);
      border: 1px solid #4b5563;
      color: #e5e7eb;
      border-radius: 999px;
      font-size: 14px;
      cursor: pointer;
      touch-action: none;
    }
    .dpad button {
      width: 40px;
      height: 40px;
    }
    .action-btn {
      width: 60px;
      height: 60px;
      font-weight: 700;
    }
    .dpad button.empty {
      visibility: hidden;
    }

    /* Admin panel */
    #admin-panel {
      position: fixed;
      left: 8px;
      bottom: 8px;
      background: rgba(0,0,0,0.75);
      border-radius: 8px;
      padding: 6px 8px;
      font-size: 11px;
      z-index: 6;
      max-width: 220px;
    }
    #admin-panel h3 {
      margin: 0 0 4px;
      font-size: 12px;
      color: #f97316;
    }
    #admin-panel input {
      width: 100%;
      margin-bottom: 4px;
      padding: 3px 4px;
      border-radius: 4px;
      border: 1px solid #4b5563;
      background: #020617;
      color: #e5e7eb;
      font-size: 11px;
    }
    #admin-panel button {
      margin-right: 4px;
      margin-top: 2px;
      padding: 3px 6px;
      border-radius: 4px;
      border: none;
      font-size: 11px;
      cursor: pointer;
    }
    #admin-kick { background:#ef4444; color:#fff; }
    #admin-respawn { background:#22c55e; color:#fff; }
  </style>
</head>
<body>
  <div id="name-modal">
    <div id="name-box">
      <h2>Choose your name</h2>
      <p style="font-size:12px;color:#9ca3af;margin:0 0 4px;">
        This name will be saved on this device.
      </p>
      <input id="name-input" placeholder="Your name" maxlength="16" />
      <button id="name-confirm">Enter World</button>
    </div>
  </div>

  <div id="status">Connecting...</div>

  <div id="chat">
    <div id="chat-log"></div>
    <div id="chat-input-row">
      <input id="chat-input" placeholder="Type message..." />
      <button id="chat-send">Send</button>
    </div>
  </div>

  <div id="controls">
    <div class="ctrl-group">
      <div class="dpad">
        <button class="empty"></button>
        <button id="btn-up">▲</button>
        <button class="empty"></button>
        <button id="btn-left">◀</button>
        <button class="empty"></button>
        <button id="btn-right">▶</button>
        <button class="empty"></button>
        <button id="btn-down">▼</button>
        <button class="empty"></button>
      </div>
    </div>
    <div class="ctrl-group">
      <button id="btn-build" class="action-btn">Build</button>
    </div>
  </div>

  <div id="admin-panel" style="display:none;">
    <h3>Admin Panel</h3>
    <input id="admin-target" placeholder="Target name" />
    <div>
      <button id="admin-kick">Kick</button>
      <button id="admin-respawn">Respawn</button>
    </div>
  </div>

  <canvas id="game" width="960" height="540"></canvas>

  <script src="https://unpkg.com/netplayjs@0.4.1/dist/netplay.js"
          integrity="sha384-6Yb8LWAT488jwK+nIjvD4S5/poq1Xn69NYjH1RXKHoaUOaFJrKQ1rfGQgKm8oQjX"
          crossorigin="anonymous"></script>
  <script src="game.js"></script>
</body>
</html>
