<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pixel Worlds Global</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; background:#050816; overflow:hidden; font-family:sans-serif; }

    canvas { display:block; touch-action:none; }

    /* NAME SCREEN */
    #name-screen {
      position:fixed; inset:0;
      background:rgba(0,0,0,0.85);
      display:flex; align-items:center; justify-content:center;
      z-index:50;
    }
    #name-box {
      background:#111827; padding:20px; border-radius:10px;
      width:260px; text-align:center;
    }
    #name-input {
      width:100%; padding:8px; margin-top:10px;
      border-radius:6px; border:1px solid #444;
      background:#000; color:#fff;
    }
    #name-btn {
      margin-top:10px; width:100%; padding:8px;
      background:#22c55e; border:none; border-radius:6px;
      color:white; font-weight:bold; cursor:pointer;
    }

    /* CHAT */
    #chat {
      position:fixed; right:10px; top:10px;
      width:220px; height:40vh;
      background:rgba(0,0,0,0.6);
      border-radius:6px; display:flex; flex-direction:column;
      z-index:20;
    }
    #chat-log { flex:1; overflow-y:auto; padding:6px; font-size:12px; }
    #chat-input-row { display:flex; }
    #chat-input {
      flex:1; background:#000; color:#fff; border:none; padding:4px;
    }
    #chat-send {
      background:#3b82f6; border:none; color:white; padding:4px 8px;
    }

    /* MOBILE CONTROLS */
    #controls {
      position:fixed; bottom:10px; left:10px; right:10px;
      display:flex; justify-content:space-between;
      pointer-events:none;
    }
    .dpad button, .action-btn {
      pointer-events:auto;
      width:50px; height:50px;
      background:rgba(0,0,0,0.6);
      border:1px solid #555; border-radius:50%;
      color:white; font-size:20px;
    }

    /* ADMIN PANEL */
    #admin-panel {
      position:fixed; bottom:10px; left:10px;
      background:rgba(0,0,0,0.7);
      padding:10px; border-radius:6px;
      display:none; z-index:30;
      width:200px; font-size:12px;
    }
    #admin-panel input {
      width:100%; margin-bottom:6px;
      background:#000; color:#fff; border:1px solid #444;
      padding:4px;
    }
    #admin-panel button {
      width:48%; padding:4px; margin-top:4px;
      border:none; border-radius:4px; color:white;
    }
    #kick-btn { background:#ef4444; }
    #respawn-btn { background:#22c55e; }
  </style>
</head>

<body>

<div id="name-screen">
  <div id="name-box">
    <h2 style="color:white;margin:0;">Enter Name</h2>
    <input id="name-input" maxlength="16">
    <button id="name-btn">Play</button>
  </div>
</div>

<div id="chat">
  <div id="chat-log"></div>
  <div id="chat-input-row">
    <input id="chat-input">
    <button id="chat-send">Send</button>
  </div>
</div>

<div id="admin-panel">
  <h3 style="margin:0;color:#f97316;">Admin</h3>
  <input id="admin-target" placeholder="Player name">
  <button id="kick-btn">Kick</button>
  <button id="respawn-btn">Respawn</button>
</div>

<div id="controls">
  <div class="dpad">
    <button id="up">▲</button>
    <button id="left">◀</button>
    <button id="right">▶</button>
    <button id="down">▼</button>
  </div>
  <button class="action-btn" id="build">🧱</button>
</div>

<canvas id="game" width="960" height="540"></canvas>

<script src="https://unpkg.com/netplayjs@0.4.1/dist/netplay.js"></script>
<script src="/game.js"></script>


</body>
</html>
